name: "Scrape showtimes"

# Scheduled (cron) runs only execute on the repository's default branch once
# this workflow file is merged there. Use workflow_dispatch to test the
# scraper from a feature branch before merging.
on:
  # Scheduled runs post live results to /api/ingest. NOTE: GitHub only runs
  # scheduled workflows on the repository's DEFAULT branch, so this fires once
  # this workflow is merged to main. Use the manual "Run workflow" button
  # (workflow_dispatch) any time; leave dry_run unchecked for a live run.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, do not POST to /api/ingest)"
        type: boolean
        default: false
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scraper dependencies
        run: cd scraper && npm install

      - name: Install Playwright browsers
        run: cd scraper && npx playwright install --with-deps chromium

      - name: Run scraper
        run: cd scraper && DRY_RUN=${{ github.event_name == 'schedule' && 'false' || inputs.dry_run }} SCRAPE_CHAINS=AMC APP_URL=${{ secrets.APP_URL }} CRON_SECRET=${{ secrets.CRON_SECRET }} npx tsx scrape.ts

      # Watchdog for the Regal-on-PC scraper. Runs even though this workflow
      # only scrapes AMC: GitHub Actions stays up when the home PC is off, so it
      # can detect the PC going offline and email one alert per outage.
      - name: Regal heartbeat watchdog
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
        run: |
          curl -sS -X POST "${{ secrets.APP_URL }}/api/cron/heartbeat-check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" || echo "heartbeat-check call failed (non-fatal)"
